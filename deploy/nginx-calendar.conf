# /etc/nginx/sites-available/calendar
# calendar.kebab-lee.com — Cloudflare Tunnel → localhost:3000
# 기존 history.kebab-lee.dev(:80) 설정은 건드리지 않는 별도 server 블록.
server {
    listen 3000;
    server_name calendar.kebab-lee.com;

    # 프론트 빌드 산출물(dist 내용물)을 직접 배치한 디렉터리
    root /home/kebab/projects/kebab-calendar/web-01;
    index index.html;

    # 사진 업로드 (백엔드 multipart: 파일 10MB / 요청 12MB 와 정합)
    client_max_body_size 12m;

    # API / 업로드 파일 → 백엔드(was). 정적보다 먼저 매칭되도록 regex location.
    location ~ ^/(api|uploads)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 해시 파일명 정적 자산 장기 캐시
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: 실제 파일 없으면 index.html 반환
    location / {
        try_files $uri /index.html;
    }
}
