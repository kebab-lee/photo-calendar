server:
  port: 8080

spring:
  application:
    name: calendar-was
  autoconfigure:
    # JWT 전용이라 기본 인메모리 유저(generated password) 불필요
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/photocalendar?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:photocalendar}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 스캐폴딩 단계: 로컬 MySQL이 없어도 앱이 기동되도록 풀 초기화 실패를 무시한다.
      # 실제 DB 연동 단계에서 정상 접속정보(환경변수)를 주입하면 그대로 동작한다.
      initialization-fail-timeout: -1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # snake_case 컬럼 <-> camelCase 프로퍼티 자동 매핑 (resultMap 수동 작성 불필요)
    map-underscore-to-camel-case: true

# 인증/JWT (1단계: access token 단일). 보안값은 환경변수로 주입, 운영에선 반드시 교체.
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-to-a-long-random-secret-at-least-32-bytes-1234567890}
    expiration-days: ${JWT_EXPIRATION_DAYS:7}
  cors:
    # 프론트(Vite dev) 연동용. 운영 도메인은 환경변수로 주입.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  upload:
    # 로컬 디스크 저장 베이스(실행 CWD 무관). 운영은 환경변수로 주입.
    dir: ${UPLOAD_DIR:${user.home}/photo-calendar-uploads}
    base-url: /uploads
    full-max-px: 1600
    thumb-max-px: 400
